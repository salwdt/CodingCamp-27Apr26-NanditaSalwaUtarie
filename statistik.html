<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistik – PinkPocket</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-page="statistik">

<div class="iphone-frame">
  <div class="btn-action"></div>
  <div class="btn-vol-up"></div>
  <div class="btn-vol-down"></div>
  <div class="btn-power"></div>
  <div class="iphone-screen">
    <div class="dynamic-island"><div class="di-dot"></div></div>

    <!-- Content -->
    <div class="app-scroll">

      <header class="header">
        <h2 class="page-title">Statistik</h2>
        <div class="period-pills">
          <button class="pill active" data-p="minggu">Minggu</button>
          <button class="pill" data-p="bulan">Bulan</button>
          <button class="pill" data-p="tahun">Tahun</button>
        </div>
      </header>

      <!-- Summary Cards -->
      <div class="summary-row">
        <div class="sum-card card-mint">
          <p class="sum-label">Pemasukan</p>
          <p class="sum-value" id="sum-masuk">Rp 0</p>
        </div>
        <div class="sum-card card-pink">
          <p class="sum-label">Pengeluaran</p>
          <p class="sum-value" id="sum-keluar">Rp 0</p>
        </div>
      </div>

      <!-- Bar Chart -->
      <div class="section-title">Pemasukan vs Pengeluaran</div>
      <div class="chart-card">
        <canvas id="barChart" height="180"></canvas>
      </div>

      <!-- Donut Chart -->
      <div class="section-title">Pengeluaran per Kategori</div>
      <div class="chart-card donut-wrap">
        <canvas id="donutChart"></canvas>
        <div class="donut-legend" id="donut-legend"></div>
      </div>

      <!-- Ringkasan -->
      <div class="section-title">Ringkasan</div>
      <div class="summary-list" id="summary-list"></div>

    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </a>
      <a href="statistik.html" class="nav-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Statistik</span>
      </a>
      <a href="tambah.html" class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Tambah</span>
      </a>
      <a href="dompet.html" class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M16 12h.01"/></svg>
        <span>Dompet</span>
      </a>
      <a href="profil.html" class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </a>
    </nav>
    <div class="home-bar"></div>
  </div>
</div>

<script src="script.js?v=2"></script>
</body>
</html>
