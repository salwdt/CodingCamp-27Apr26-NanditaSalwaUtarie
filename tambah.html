<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tambah – PinkPocket</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body data-page="tambah">

<div class="iphone-frame">
  <div class="btn-action"></div>
  <div class="btn-vol-up"></div>
  <div class="btn-vol-down"></div>
  <div class="btn-power"></div>
  <div class="iphone-screen">
    <div class="dynamic-island"><div class="di-dot"></div></div>

    <div class="app-scroll">

      <header class="header">
        <h2 class="page-title">Tambah Transaksi</h2>
      </header>

      <!-- Type Toggle -->
      <div class="type-toggle">
        <button class="type-btn active" data-type="pengeluaran">Pengeluaran</button>
        <button class="type-btn" data-type="pemasukan">Pemasukan</button>
      </div>

      <!-- Amount Display -->
      <div class="amount-display">
        <span class="amount-prefix">Rp</span>
        <span class="amount-value" id="amount-display">0</span>
      </div>

      <!-- Numpad -->
      <div class="numpad">
        <button class="num-btn" data-val="1">1</button>
        <button class="num-btn" data-val="2">2</button>
        <button class="num-btn" data-val="3">3</button>
        <button class="num-btn" data-val="4">4</button>
        <button class="num-btn" data-val="5">5</button>
        <button class="num-btn" data-val="6">6</button>
        <button class="num-btn" data-val="7">7</button>
        <button class="num-btn" data-val="8">8</button>
        <button class="num-btn" data-val="9">9</button>
        <button class="num-btn" data-val="000">000</button>
        <button class="num-btn" data-val="0">0</button>
        <button class="del-btn" id="btn-del">⌫</button>
      </div>

      <!-- Form -->
      <div class="form-section">
        <div class="form-group">
          <label>Keterangan</label>
          <input type="text" id="tx-desc" placeholder="Contoh: Makan siang" />
        </div>
        <div class="form-group">
          <label>Kategori</label>
          <select id="tx-category">
            <option value="Makanan">Makanan</option>
            <option value="Transportasi">Transportasi</option>
            <option value="Belanja">Belanja</option>
            <option value="Hiburan">Hiburan</option>
            <option value="Kesehatan">Kesehatan</option>
            <option value="Tagihan">Tagihan</option>
            <option value="Gaji">Gaji</option>
            <option value="Investasi">Investasi</option>
            <option value="Lainnya">Lainnya</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tanggal</label>
          <input type="date" id="tx-date" />
        </div>
        <button class="btn-save" id="btn-save">Simpan Transaksi</button>
      </div>

      <div class="toast" id="toast"></div>

    </div>

    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </a>
      <a href="statistik.html" class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Statistik</span>
      </a>
      <a href="tambah.html" class="nav-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Tambah</span>
      </a>
      <a href="dompet.html" class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M16 12h.01"/></svg>
        <span>Dompet</span>
      </a>
      <a href="profil.html" class="nav-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </a>
    </nav>
    <div class="home-bar"></div>
  </div>
</div>

<script src="script.js?v=2"></script>
</body>
</html>
