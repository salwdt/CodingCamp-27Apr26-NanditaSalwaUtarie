<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinkPocket</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    @import url('https://fonts.cdnfonts.com/css/laries-script');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:      #ffd8de;
      --pink-d:    #e05c6e;
      --text:      #555566;
      --sub:       #9191aa;
      --border:    #ebebf0;
      --white:     #ffffff;
      --bg:        #fafafa;
      --shadow:    0 4px 20px rgba(120,120,180,.10);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Screens ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      transition: opacity .4s ease, transform .4s ease;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px);
    }

    /* ══ SPLASH ══ */
    #screen-splash {
      background: var(--pink);
      align-items: center;
      justify-content: center;
      cursor: pointer;
      gap: 16px;
    }
    .brand-logo {
      font-family: 'Laries Script', 'Dancing Script', cursive;
      font-size: clamp(56px, 10vw, 120px);
      color: var(--white);
      text-shadow: 0 4px 20px rgba(0,0,0,.1);
      text-align: center;
      animation: pulse 2s ease-in-out infinite;
    }
    .tap-hint {
      font-size: 14px;
      color: rgba(255,255,255,.65);
      letter-spacing: .5px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .45; }
    }

    /* ══ LOGIN / REGISTER ══ */
    #screen-login,
    #screen-register {
      background: var(--bg);
      align-items: center;
      justify-content: center;
      overflow-y: auto;
    }

    .auth-card {
      background: var(--white);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(120,120,180,.12);
      margin: 24px 16px;
    }

    .screen-brand {
      font-family: 'Laries Script', 'Dancing Script', cursive;
      font-size: 40px;
      color: var(--pink-d);
      text-align: center;
      margin-bottom: 8px;
    }
    .screen-title {
      font-size: 18px; font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group { margin-bottom: 14px; }
    .form-input {
      width: 100%; padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 14px; font-family: 'Inter', sans-serif;
      color: var(--text); background: #fafafa;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-input:focus {
      border-color: var(--pink-d);
      box-shadow: 0 0 0 3px rgba(255,216,222,.3);
      background: var(--white);
    }
    .form-input::placeholder { color: var(--sub); }

    .btn-primary {
      width: 100%; padding: 14px;
      background: var(--pink);
      color: var(--pink-d);
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer; margin-top: 4px;
      transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 16px rgba(255,216,222,.5);
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:active { transform: scale(.98); }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0; color: var(--sub); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .social-row { display: flex; gap: 12px; justify-content: center; }
    .btn-social {
      width: 52px; height: 52px;
      border: 1.5px solid var(--border); border-radius: 14px;
      background: var(--white); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, box-shadow .2s;
    }
    .btn-social:hover {
      border-color: var(--pink-d);
      box-shadow: 0 2px 10px rgba(255,216,222,.4);
    }

    .footer-link {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--sub);
    }
    .footer-link a {
      color: var(--pink-d); font-weight: 700;
      text-decoration: none; cursor: pointer;
    }
    .footer-link a:hover { text-decoration: underline; }

    .back-btn {
      background: none; border: none;
      cursor: pointer; color: var(--pink-d);
      font-size: 22px; padding: 0;
      margin-bottom: 12px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <!-- ══ SPLASH ══ -->
  <div class="screen" id="screen-splash">
    <div class="brand-logo">PinkPocket</div>
    <p class="tap-hint">Klik untuk mulai</p>
  </div>

  <!-- ══ LOGIN ══ -->
  <div class="screen hidden" id="screen-login">
    <div class="auth-card">
      <div class="screen-brand">PinkPocket</div>
      <div class="screen-title">Login to your Account</div>

      <div class="form-group">
        <input class="form-input" type="email" placeholder="Email" />
      </div>
      <div class="form-group">
        <input class="form-input" type="password" placeholder="Password" />
      </div>

      <button class="btn-primary" id="btn-login">Sign in</button>

      <div class="divider">- Or sign in with -</div>

      <div class="social-row">
        <button class="btn-social">
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        </button>
        <button class="btn-social">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
        </button>
        <button class="btn-social">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#1DA1F2" d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
        </button>
      </div>

      <div class="footer-link">
        Don't have an account? <a id="btn-to-register">Sign up</a>
      </div>
    </div>
  </div>

  <!-- ══ REGISTER ══ -->
  <div class="screen hidden" id="screen-register">
    <div class="auth-card">
      <button class="back-btn" id="btn-back">←</button>
      <div class="screen-brand">PinkPocket</div>
      <div class="screen-title">Create your Account</div>

      <div class="form-group"><input class="form-input" type="text" id="reg-name" placeholder="Nama Lengkap" /></div>
      <div class="form-group"><input class="form-input" type="email" id="reg-email" placeholder="Email" /></div>
      <div class="form-group"><input class="form-input" type="password" id="reg-pass" placeholder="Password" /></div>
      <div class="form-group"><input class="form-input" type="password" id="reg-pass2" placeholder="Confirm Password" /></div>

      <p id="reg-error" style="color:#e05c6e;font-size:12px;margin-bottom:8px;display:none"></p>

      <button class="btn-primary" id="btn-register">Sign up</button>

      <div class="divider">- Or sign up with -</div>

      <div class="social-row">
        <button class="btn-social"><svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg></button>
        <button class="btn-social"><svg width="20" height="20" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg></button>
        <button class="btn-social"><svg width="20" height="20" viewBox="0 0 24 24"><path fill="#1DA1F2" d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg></button>
      </div>

      <div class="footer-link">
        Already have an account? <a id="btn-to-login">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    // Apply saved theme
    if (localStorage.getItem('pk_theme') === 'dark') document.body.classList.add('dark');

    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    document.getElementById('screen-splash').addEventListener('click', () => show('screen-login'));

    // Login — langsung masuk dashboard
    document.getElementById('btn-login').addEventListener('click', () => {
      window.location.href = 'dashboard.html';
    });

    // Register — validasi & simpan nama
    document.getElementById('btn-register').addEventListener('click', () => {
      const name  = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pass  = document.getElementById('reg-pass').value;
      const pass2 = document.getElementById('reg-pass2').value;
      const err   = document.getElementById('reg-error');

      if (!name)  { err.textContent = 'Nama tidak boleh kosong'; err.style.display = 'block'; return; }
      if (!email) { err.textContent = 'Email tidak boleh kosong'; err.style.display = 'block'; return; }
      if (!pass)  { err.textContent = 'Password tidak boleh kosong'; err.style.display = 'block'; return; }
      if (pass !== pass2) { err.textContent = 'Password tidak cocok'; err.style.display = 'block'; return; }

      err.style.display = 'none';

      // Simpan profil ke localStorage
      localStorage.setItem('pk_profile', JSON.stringify({ name, email }));
      // Reset data lama supaya mulai fresh
      localStorage.removeItem('pk_transactions');
      localStorage.removeItem('pk_saldo_awal');
      localStorage.setItem('pk_fresh_v1', '1');
      localStorage.setItem('pk_seed_v5', '1');

      window.location.href = 'dashboard.html';
    });

    document.getElementById('btn-to-register').addEventListener('click', () => show('screen-register'));
    document.getElementById('btn-to-login').addEventListener('click', () => show('screen-login'));
    document.getElementById('btn-back').addEventListener('click', () => show('screen-login'));
  </script>

</body>
</html>
