<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinkPocket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    @import url('https://fonts.cdnfonts.com/css/laries-script');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:       #ffd8de;
      --pink-dark:  #e8959c;
      --pink-light: #ffd8de;
      --text:       #2a2a3a;
      --sub:        #888;
      --border:     #ebebf0;
      --white:      #ffffff;
      --bg:         #fafafa;
      --r:          14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #d6d8e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      gap: 36px;
      flex-wrap: wrap;
    }

    /* ══════════════════════════════
       iPhone 16 Frame
    ══════════════════════════════ */
    .iphone-frame {
      position: relative;
      width: 320px;
      height: 693px;
      background: #1c1c1e;
      border-radius: 50px;
      flex-shrink: 0;
      box-shadow:
        inset 0 0 0 1px #48484a,
        inset 0 0 0 2.5px #1c1c1e,
        0 50px 100px rgba(0,0,0,.6),
        0 16px 36px rgba(0,0,0,.28);
    }

    /* Physical buttons */
    .btn-action   { position: absolute; left: -3px; top: 108px; width: 3px; height: 30px; background: #48484a; border-radius: 2px 0 0 2px; }
    .btn-vol-up   { position: absolute; left: -3px; top: 156px; width: 3px; height: 52px; background: #48484a; border-radius: 2px 0 0 2px; }
    .btn-vol-down { position: absolute; left: -3px; top: 220px; width: 3px; height: 52px; background: #48484a; border-radius: 2px 0 0 2px; }
    .btn-power    { position: absolute; right: -3px; top: 168px; width: 3px; height: 68px; background: #48484a; border-radius: 0 2px 2px 0; }

    /* Screen */
    .iphone-screen {
      position: absolute;
      inset: 7px;
      border-radius: 43px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 104px;
      height: 30px;
      background: #000;
      border-radius: 18px;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 11px;
    }
    .di-dot {
      width: 9px; height: 9px;
      background: #111;
      border-radius: 50%;
      border: 1.5px solid #222;
    }

    /* Status bar */
    .status-bar {
      flex-shrink: 0;
      height: 48px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 22px 7px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      position: relative;
      z-index: 5;
    }
    .sb-icons { display: flex; align-items: center; gap: 5px; }

    /* Home bar */
    .home-bar {
      flex-shrink: 0;
      height: 18px;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .home-bar::after {
      content: '';
      width: 110px; height: 4px;
      background: #1c1c1e;
      border-radius: 99px;
      opacity: .15;
    }

    /* ══════════════════════════════
       Screen content
    ══════════════════════════════ */
    .screen-content {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .screen-content::-webkit-scrollbar { display: none; }

    /* Splash */
    .screen-splash {
      height: 100%;
      background: var(--pink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 32px 24px;
    }
    .brand-logo {
      font-family: 'Laries Script', 'Dancing Script', cursive;
      font-size: 48px;
      color: var(--white);
      text-shadow: 0 2px 12px rgba(0,0,0,.12);
      line-height: 1.1;
      text-align: center;
    }
    .brand-tagline {
      color: rgba(255,255,255,.8);
      font-size: 12px;
      letter-spacing: .5px;
    }

    /* Login / Register */
    .screen-login,
    .screen-register {
      padding: 20px 24px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100%;
    }
    .screen-header {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }
    .back-btn {
      width: 28px; height: 28px;
      border: none; background: none;
      cursor: pointer;
      color: var(--pink-dark);
      font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: background .2s;
    }
    .back-btn:hover { background: var(--pink-light); }

    .screen-brand {
      font-family: 'Laries Script', 'Dancing Script', cursive;
      font-size: 28px;
      color: var(--pink);
      text-align: center;
      margin-bottom: 20px;
    }
    .screen-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
    }

    /* Form */
    .form-group { margin-bottom: 12px; }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: #fafafa;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-input::placeholder { color: var(--sub); }
    .form-input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(255,216,222,.2);
      background: var(--white);
    }

    /* Primary button */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--pink);
      color: var(--white);
      border: none;
      border-radius: var(--r);
      font-size: 14px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 4px;
      transition: background .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(255,216,222,.4);
    }
    .btn-primary:hover { background: var(--pink-dark); }
    .btn-primary:active { transform: scale(.98); }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 16px 0;
      color: var(--sub);
      font-size: 11px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    /* Social buttons */
    .social-row { display: flex; gap: 12px; justify-content: center; }
    .btn-social {
      width: 46px; height: 46px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--white);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, box-shadow .2s;
    }
    .btn-social:hover {
      border-color: var(--pink);
      box-shadow: 0 2px 8px rgba(255,216,222,.3);
    }

    /* Footer link */
    .footer-link {
      text-align: center;
      margin-top: 16px;
      padding-top: 0;
      font-size: 12px;
      color: var(--sub);
    }
    .footer-link a {
      color: var(--pink-dark);
      font-weight: 700;
      text-decoration: none;
    }
    .footer-link a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 760px) {
      body { flex-direction: column; align-items: center; }
    }
  </style>
</head>
